<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema RA - Control de Artes</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.sidebar{width:250px;background:#1f2d3d;height:100vh;position:fixed;color:white;padding:20px;}
.sidebar button{width:100%;margin:10px 0;padding:10px;background:#3c8dbc;border:none;color:white;cursor:pointer;}
.main{margin-left:270px;padding:20px;}
.panel{display:none;background:white;padding:20px;border-radius:10px;}
input,select{width:100%;padding:8px;margin:5px 0;}
</style>

</head>

<body>

<div class="sidebar">

<h2>RA ARTES</h2>

<button onclick="mostrar('nuevo')">Cargar Producto</button>
<button onclick="mostrar('buscar')">Buscar Producto</button>
<button onclick="mostrar('prioridades')">Prioridades</button>
<button onclick="mostrar('revision')">Revisión</button>

</div>

<div class="main">

<div id="nuevo" class="panel">

<h2>Nuevo Producto</h2>

<input id="nombre" placeholder="Nombre">
<input id="rs" placeholder="Registro sanitario">
<input id="expediente" placeholder="Expediente">
<input id="ean" placeholder="EAN">
<input id="fabricante" placeholder="Fabricante">
<input id="pais" placeholder="País">

<label>PDF Arte</label>
<input type="file" id="pdf" accept="application/pdf">

<button onclick="guardarProducto()">Guardar</button>

</div>

<div id="buscar" class="panel">
<h2>Productos</h2>
<div id="listaProductos"></div>
</div>

<div id="prioridades" class="panel">
<h2>Prioridades</h2>
<div id="listaPrioridades"></div>
</div>

<div id="revision" class="panel">
<h2>Resultado</h2>
<div id="resultado"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
