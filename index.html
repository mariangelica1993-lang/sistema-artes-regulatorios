<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RA ARTES PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#1f2d3d;
color:white;
height:100vh;
padding:20px;
}

.sidebar h3{
margin-top:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:6px;
text-align:left;
}

.sidebar button:hover{
background:#3c8dbc;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* BADGES */
.badge{
padding:5px 10px;
border-radius:8px;
color:white;
}

.urgente{background:red;}
.media{background:orange;}
.baja{background:green;}

</style>

</head>

<body>

<div class="sidebar">

<h2>RA-ARTES</h2>

<!-- ALVID -->
<h3>ALVID</h3>

<button onclick="abrirModulo('ALVID','prioridades')">Panel de prioridades</button>
<button onclick="abrirModulo('ALVID','cargar')">Cargar nuevo arte</button>
<button onclick="abrirModulo('ALVID','revision')">Resultado revisión</button>

<!-- CODEX -->
<h3>CODEX</h3>

<button onclick="abrirModulo('CODEX','prioridades')">Panel de prioridades</button>
<button onclick="abrirModulo('CODEX','cargar')">Cargar nuevo arte</button>
<button onclick="abrirModulo('CODEX','revision')">Resultado revisión</button>

</div>

<div class="main">

<h2 id="titulo"></h2>

<!-- PRIORIDADES -->
<div id="prioridades" class="card">
<h3>Panel de Prioridades</h3>
<div id="listaPrioridades"></div>
</div>

<!-- CARGAR -->
<div id="cargar" class="card">
<h3>Cargar nuevo arte</h3>

<input id="nombre" placeholder="Producto">
<input id="rs" placeholder="Registro sanitario">
<input id="expediente" placeholder="Expediente">
<input id="ean" placeholder="EAN">
<input id="fabricante" placeholder="Fabricante">
<input id="pais" placeholder="País">

<input type="file" id="pdf">

<button onclick="guardar()">Guardar</button>

</div>

<!-- REVISION -->
<div id="revision" class="card">
<h3>Resultado revisión</h3>
<div id="resultado"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
