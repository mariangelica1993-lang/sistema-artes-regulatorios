<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RA ARTES</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#1f2d3d;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
background:#3c8dbc;
border:none;
color:white;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* PRIORIDADES */
.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

/* BADGES */
.badge{
padding:5px 10px;
border-radius:8px;
color:white;
}

.urgente{background:red;}
.media{background:orange;}
.baja{background:green;}

/* TABLA */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:6px 10px;
border:none;
background:#3c8dbc;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>RA-ARTES</h2>

<button onclick="empresa('ALVID')">ALVID</button>
<button onclick="empresa('CODEX')">CODEX</button>

<button onclick="mostrar('prioridades')">Panel de Prioridades</button>
<button onclick="mostrar('tabla')">Productos</button>

</div>

<div class="main">

<h2 id="empresaTitulo">ALVID</h2>

<!-- PRIORIDADES -->
<div id="prioridades" class="card">

<h3>ARTES MÁS URGENTES</h3>

<div id="listaPrioridades"></div>

</div>

<!-- TABLA -->
<div id="tabla" class="card">

<h3>Productos</h3>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Arte</th>
<th>Edición</th>
<th>Prioridad</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaProductos"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
