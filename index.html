<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RA ARTES PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#1f2d3d;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#3c8dbc;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* SEARCH */
.search{
padding:10px;
width:300px;
border-radius:8px;
border:1px solid #ccc;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

/* PRIORIDADES */
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

/* BADGES */
.badge{
padding:5px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

.urgente{background:#e74c3c;}
.media{background:#f39c12;}
.baja{background:#2ecc71;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
background:#f0f0f0;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

button.action{
background:#3c8dbc;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>RA-ARTES</h2>

<button onclick="cambiarEmpresa('ALVID')">ALVID</button>
<button onclick="cambiarEmpresa('CODEX')">CODEX</button>

<hr>

<button onclick="mostrar('dashboard')">Panel Prioridades</button>
<button onclick="mostrar('tabla')">Productos</button>

</div>

<div class="main">

<div class="header">

<h2 id="empresaTitulo">ALVID</h2>

<input type="text" class="search" placeholder="Buscar producto..." onkeyup="buscar(this.value)">

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card">

<h3>ARTES MÁS URGENTES</h3>

<div id="prioridades"></div>

</div>

<!-- TABLA -->
<div id="tabla" class="card">

<h3>Listado de Productos</h3>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Arte</th>
<th>Edición</th>
<th>Prioridad</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
